name: security
on: [ push ]

jobs:
  spotbugs-sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: gradle
      - name: Set up Gradle 9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.0.0'
      - name: Build with Gradle
        run: ./gradlew build
      - name: Download SpotBugs
        run: |
          curl -L -o spotbugs.tgz https://github.com/spotbugs/spotbugs/releases/download/4.9.4/spotbugs-4.9.4.tgz
          tar -xzf spotbugs.tgz --strip-components=2 spotbugs-4.9.4/bin/spotbugs
          awk 'NR==1{$0="#!/usr/bin/sh"}1' spotbugs > tmp && mv tmp spotbugs
          rm -rf tmp
          chmod +x spotbugs
      - name: Run SpotBugs Analysis
        run: |
          ./spotbugs -textui -html -output spotbugs.html build/classes/java/main
      - name: Upload SpotBugs report
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: spotbugs.html

  snyk-sca:
    runs-on: ubuntu-latest
    needs: spotbugs-sast
    steps:
      - uses: actions/checkout@master
      - name: Snyk Check
        uses: snyk/actions/gradle-9-jdk21@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_API_KEY }}
